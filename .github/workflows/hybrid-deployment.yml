name: Hybrid Cloud Deployment

on:
  push:
    paths:
      - "ansible/**"
      - "container/**"
      - "terraform/**"
      - ".github/workflows/hybrid-deployment.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/hello-world-hybrid
  TF_IN_AUTOMATION: "true"

jobs:
  build-container:
    name: Build and publish Hello World container
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Docker image
        run: docker build -t "${IMAGE_NAME}:latest" -t "${IMAGE_NAME}:${GITHUB_SHA}" container

      - name: Push Docker image
        run: |
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"

  terraform-check:
    name: Check Terraform
    runs-on: self-hosted
    defaults:
      run:
        working-directory: terraform/hybrid

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive .

      - name: Initialize Terraform
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          TF_VAR_esxi_password: ${{ secrets.ESXI_PASSWORD }}

      - name: Validate Terraform
        run: terraform validate

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Check Terraform best practices with TFLint
        run: tflint --init && tflint

  deploy-hybrid:
    name: Apply infrastructure and deploy container
    runs-on: self-hosted
    needs:
      - build-container
      - terraform-check
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize Terraform
        run: terraform -chdir=terraform/hybrid init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          TF_VAR_esxi_password: ${{ secrets.ESXI_PASSWORD }}

      - name: Create Terraform plan
        run: terraform -chdir=terraform/hybrid plan -out=tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          TF_VAR_esxi_password: ${{ secrets.ESXI_PASSWORD }}
          TF_VAR_container_image: ${{ env.IMAGE_NAME }}:latest

      - name: Apply Terraform plan
        run: terraform -chdir=terraform/hybrid apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          TF_VAR_esxi_password: ${{ secrets.ESXI_PASSWORD }}

      - name: Install Ansible Galaxy requirements
        run: |
          ansible-galaxy install -r ansible/requirements.yml -p ansible/galaxy_roles

      - name: Deploy hybrid configuration
        run: ANSIBLE_CONFIG=ansible/ansible.cfg ansible-playbook ansible/playbooks/galaxy-site.yml
