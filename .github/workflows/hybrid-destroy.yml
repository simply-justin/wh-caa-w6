name: Destroy Hybrid Cloud

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type destroy to remove Azure and ESXi resources"
        required: true
        type: string

env:
  TF_IN_AUTOMATION: "true"

jobs:
  destroy-hybrid:
    name: Destroy hybrid infrastructure
    runs-on: self-hosted
    if: ${{ github.event.inputs.confirm_destroy == 'destroy' }}
    defaults:
      run:
        working-directory: terraform/hybrid

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize Terraform
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Destroy Azure and ESXi resources
        run: |
          if [ -n "${AZURE_RESOURCE_GROUP_NAME}" ]; then
            export TF_VAR_azure_resource_group_name="${AZURE_RESOURCE_GROUP_NAME}"
          fi
          if [ -n "${ESXI_HOSTNAME}" ]; then
            export TF_VAR_esxi_hostname="${ESXI_HOSTNAME}"
          fi
          if [ -n "${ESXI_USERNAME}" ]; then
            export TF_VAR_esxi_username="${ESXI_USERNAME}"
          fi

          terraform destroy -auto-approve
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          AZURE_RESOURCE_GROUP_NAME: ${{ vars.AZURE_RESOURCE_GROUP_NAME }}
          ESXI_HOSTNAME: ${{ vars.ESXI_HOSTNAME }}
          ESXI_USERNAME: ${{ vars.ESXI_USERNAME }}
          TF_VAR_esxi_password: ${{ secrets.ESXI_PASSWORD }}
